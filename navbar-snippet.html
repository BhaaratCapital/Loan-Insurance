<style>

}
#navbar.scrolled { background: rgba(10,10,15,0.98); }
.nav-inner {
  max-width: 1200px;
  margin: 0 auto;
  padding: 0 2rem;
  display: flex;
  align-items: center;
  gap: 1.5rem;
  height: 72px;
}
.nav-logo-img {
  height: 90px;
  width: auto;
  display: block;
  filter: drop-shadow(0 0 12px rgba(249,115,22,0.4));
}
.nav-links {
  display: flex;
  list-style: none;
  gap: 0.3rem;
  margin: 0;
  padding: 0;
  flex: 1;
}
.nav-links a {
  color: #C5C8D8;
  font-size: 0.88rem;
  letter-spacing: 0.01em;
  text-decoration: none;
  padding: 0.45rem 0.85rem;
  border-radius: 8px;
  transition: all 0.2s;
  display: block;
}
.nav-links a:hover,
.nav-links a.active {
  color: #F59E0B;
  background: rgba(245,158,11,0.18);
}
.nav-cta {
  background: linear-gradient(135deg, #22c55e, #16a34a);
  border: none;
  color: #fff !important;
  font-size: 0.83rem;
  padding: 0.6rem 1.2rem;
  border-radius: 50px;

}
.nav-cta:hover {

.hamburger {
  display: none;

  background: none;
  border: none;

}
.mobile-menu {
  background: #0A0A0F;

  padding: 1rem 1.5rem 1.5rem;

}
.mobile-menu a:hover { color: #F59E0B; }
.mobile-menu a.active { color: #F59E0B; }
@media(max-width:768px) {
  .nav-links { display: none; }
  .hamburger { display: block; }

<script>

  document.getElementById("navbar").classList.toggle("scrolled", window.scrollY > 50);
